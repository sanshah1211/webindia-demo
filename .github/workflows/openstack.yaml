name: OpenStack Workflow
on: push
jobs:
  openstack-preperations-step:
    runs-on: small
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create VENV to Install OpenStack SDK
        run: |
          python3 -m venv venv
          source venv/bin/activate

      - name: Install OpenStack SDK
        run: |
          pip install openstacksdk
          
    
  openstack-connect-test: 
    needs: openstack-preperations-step
    runs-on: small
    steps:
      - name: Connect to OpenStack Cloud and List servers
        run: |
           cd python-openstack && source admin-openrc.sh
           python connect.py > server-list.txt
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: server-list-text-file
          path: python-openstack/server-list.txt
    
  openstack-connect-verification:
    needs: openstack-connect-test
    runs-on: small
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: server-list-text-file

      - name: Read Server List Data
        run: |
          ls -l 
          cat python-openstack/server-list.txt





      